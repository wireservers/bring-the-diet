# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - bring-the-diet-web

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Prepare standalone deployment
        run: |
          cp -rL web/.next/standalone ./deploy
          cp -rL web/.next/static ./deploy/web/.next/static
          [ -d web/public ] && cp -rL web/public ./deploy/web/public || true
          # Next's standalone tracer misses several of Next's own dynamic runtime
          # requires (@next/env, @swc/helpers, styled-jsx, …) in pnpm monorepos.
          # Rather than chase them one by one, overlay the workspace's hoisted
          # node_modules on top of the standalone bundle. Existing traced files
          # win on conflict (`-n` = no-clobber).
          cp -rL -n node_modules/. ./deploy/web/node_modules/ || true
          # Strip scripts/packageManager from the deployed root package.json so Azure
          # Oryx doesn't try to run `npm run build` (which calls pnpm) on deploy.
          if [ -f ./deploy/package.json ]; then
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./deploy/package.json','utf8')); delete p.scripts; delete p.packageManager; fs.writeFileSync('./deploy/package.json', JSON.stringify(p,null,2));"
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BRING_THE_DIET }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BRING_THE_DIET }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bring-the-diet-web'
          slot-name: 'Production'
          package: .
          startup-command: 'node web/server.js'
