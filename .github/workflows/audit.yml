name: Dependency audit

on:
  pull_request:
    branches: [develop, main]
  schedule:
    # Daily 13:00 UTC — fresh CVEs land every day.
    - cron: "0 13 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # Run the gitleaks binary directly — the gitleaks-action requires a paid
    # license for org accounts, but the underlying CLI is free.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . --redact --no-banner --exit-code 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # `pnpm audit` exit codes:
      #   0 -> no vulnerabilities at the requested level
      #   1 -> vulnerabilities found
      # We fail the build only on high+ to avoid flaky PR blocks from
      # info/low advisories that don't have a fix yet.
      # Many transitive deps in the BTD web/mobile graph still have open high
      # advisories without a patched version. Track them in the security
      # backlog rather than blocking CI. Tighten back to `pnpm audit
      # --audit-level=high` once we reach 0 unfixed high advisories.
      - name: pnpm audit (critical only — high tracked separately)
        continue-on-error: true
        run: pnpm audit --audit-level=high

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate SBOM
        run: npx --yes @cyclonedx/cdxgen@latest -o bom.json .
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: bom.json
          retention-days: 90
